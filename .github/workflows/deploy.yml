name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate PocketBase URL configuration
        env:
          VITE_POCKETBASE_URL: ${{ secrets.VITE_POCKETBASE_URL || vars.VITE_POCKETBASE_URL }}
        run: |
          if [ -z "$VITE_POCKETBASE_URL" ]; then
            echo "::error::Missing required environment variable VITE_POCKETBASE_URL in GitHub Secrets or Variables."
            exit 1
          fi

      - name: Build
        env:
          VITE_POCKETBASE_URL: ${{ secrets.VITE_POCKETBASE_URL || vars.VITE_POCKETBASE_URL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
      needs: deploy
      runs-on: ubuntu-latest
      if: always()
      steps:
        - name: Notify via ntfy.sh
          env:
            NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          run: |
            if [ "${{ needs.deploy.result }}" = "success" ]; then
              curl -H "Title: Déploiement réussi ✅" \
                  -H "Priority: default" \
                  -H "Tags: white_check_mark" \
                  -d "Nouvelle version de ${{ github.repository }} déployée sur https://yroffin.github.io/msilab-app/. Commit: ${{ github.sha }}" \
                  "ntfy.sh/$NTFY_TOPIC"
            else
              curl -H "Title: Déploiement échoué ❌" \
                  -H "Priority: urgent" \
                  -H "Tags: x" \
                  -d "Le déploiement de ${{ github.repository }} a échoué. Voir: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
                  "ntfy.sh/$NTFY_TOPIC"
            fi
# openspec/config.yaml
schema: spec-driven

context: |
  Type de projet : PWA pour une association fablab, avec un module WASM.

  Stack technique :
  - Frontend
      langage: TypeScript
      bundler: Vite
      framework: React (18+)
      pwd: Service Worker via vite-plugin-pwa
  - Backend : (desactivé)
      langage: Go (net/http)
      network: API HTTP + endpoint SSE for real time
  - Module WASM : (desactivé)
      langage: Go compilé with TinyGo binaire léger, interop JS via syscall/js
    restreint à l'API TinyGo)
  - Choix délibéré : un seul langage (Go) pour backend ET WASM

  - Architecture:
      pattern: Clean Architecture
      couches:
        domain: entités métier pures, aucune dépendance externe (adhérent, machine, réservation)
        application: use-cases / services, orchestrent le domain, dépendent d'interfaces (ports)
        infrastructure: implémentations concrètes (SDK PocketBase, IndexedDB, cache Service Worker)
        presentation: composants React, hooks, état UI — dépend de application, jamais l'inverse
      regle_dependance: les couches internes ne connaissent jamais les couches externes

  - Design:
      style: monochrome, graphique, noir/blanc/nuances de gris
      palette: échelle de gris custom (10 nuances + noir/blanc purs), aucune couleur d'accent
      typographie: police à fort caractère graphique comme vecteur d'identité principal
      hierarchie: contraste et taille typographique plutôt que couleur
      accessibilite: ratio de contraste WCAG AA minimum (4.5:1 texte courant, 3:1 titres)
      etats_interactifs: hover/focus/disabled signalés par contraste/opacité/soulignement, pas par couleur

  Fonctionnalités principales :
  1. Zone publique (non authentifiée) : news du projet, présentation de l'association,
     lisible offline une fois mise en cache par le Service Worker.
  2. Zone membres (authentifiée) : chat interne entre membres.
     - Moteur de chat interne :
       - Réception : flux SSE (net/http avec http.Flusher), authentifiée par token
       - Envoi : requêtes HTTP POST classiques
       - Reconnexion : gestion Last-Event-ID côté client

  Contraintes :
  - Séparation stricte entre contenu public (offline, non authentifié) et contenu privé
    (chat membres, session valide requise)
  - Le token de session ne doit jamais être exposé au Service Worker en cache partagé
  - Le flux SSE ne doit pas être mis en cache par le Service Worker
  - Module WASM : compilé via TinyGo, vérifier la compatibilité de chaque dépendance
    Go utilisée avant de l'introduire

rules:
  proposal:
    - Préciser si la fonctionnalité touche la zone publique, la zone membres, ou les deux
    - Justifier tout écart avec la Clean Architecture définie dans le contexte
    - Préciser l'impact sur le module WASM si la proposal touche au frontend
  specs:
    - Format Given/When/Then pour les scénarios
    - Distinguer explicitement les endpoints/flux publics (offline) des privés (authentifiés)
  design:
    - Documenter dans quelle couche (domain/application/infrastructure/presentation) chaque nouvel élément se situe
    - Vérifier la compatibilité TinyGo de toute nouvelle dépendance Go si le module WASM est concerné
  tasks:
    - Grouper les tâches par couche d'architecture
  apply:
    - Ne jamais faire fuiter le token de session dans le cache du Service Worker
    - Ne jamais mettre en cache le flux SSE
